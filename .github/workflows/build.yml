name: Build and Release

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            binary_name: web-ssh-linux-amd64
            artifact_name: web-ssh-installer.sh
          - os: windows
            arch: amd64
            binary_name: web-ssh-windows-amd64.exe
            artifact_name: web-ssh-windows-amd64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          go mod tidy
          go mod vendor
          go build -v -ldflags="-s -w" -o ${{ matrix.binary_name }} .

      - name: Bundle Installer (Linux Only)
        if: matrix.os == 'linux'
        run: |
          cp install.sh web-ssh-installer.sh
          cat ${{ matrix.binary_name }} >> web-ssh-installer.sh
          chmod +x web-ssh-installer.sh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary_name }}-files
          path: |
            ${{ matrix.binary_name }}
            ${{ matrix.os == 'linux' && 'web-ssh-installer.sh' || '' }}

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/web-ssh-installer.sh
            artifacts/web-ssh-linux-amd64
            artifacts/web-ssh-windows-amd64.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
